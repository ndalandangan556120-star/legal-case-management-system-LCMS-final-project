version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: lcms-app
    ports:
      - "10000:10000"
    env_file:
      - .env.docker
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    networks:
      - lcms-network

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - lcms-network

  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - lcms-network

volumes:
  db_data:

networks:
  lcms-network:
    driver: bridge
